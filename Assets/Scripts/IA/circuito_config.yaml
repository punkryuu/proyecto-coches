behaviors:
  NPCAgent:
    trainer_type: ppo

    hyperparameters:
      batch_size: 128
      buffer_size: 2048
      learning_rate: 0.0003
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      # Si no usas cámaras, este campo se ignora sin problema
      vis_encode_type: simple
      # Por si en el futuro quieres RNN
      use_recurrent: false

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.02
        encoding_size: 256
        learning_rate: 0.0003

    behavioral_cloning:
      demo_path: ""   
      strength: 0.7
      steps: 100000
      batch_size: 128
      num_epoch: 3

    max_steps: 400000
    time_horizon: 128
    summary_freq: 10000