behaviors:
  NPCAgent:
    trainer_type: ppo

    hyperparameters:
      batch_size: 256
      buffer_size: 8192
      learning_rate: 3.0e-4
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3

    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0

      gail:
        strength: 0.5
        gamma: 0.99
        demo_path: Assets/demos2

    behavioral_cloning:
      demo_path: Assets/demos2
      strength: 1
      steps: 100000

    max_steps: 5000000
    time_horizon: 64
    summary_freq: 10000